# 飞书应用配置，需要用户自行填写
feishu:
  app_id: "c5"
  app_secret: ""
  # 模拟模式开关：强制关闭，必须使用真实飞书API
  use_mock: false  
  # 飞书目标链接（自动解析表格参数，无需手动配置app_token和table_id）
  target_feishu_url: ""

  # 多表格配置（系统自动解析填充，无需手动修改）
  tables:
    # 番茄小说热榜书籍表（已手动配置，避免自动解析问题）
    default:
      app_token: ""
      table_id: ""
    # 可以添加更多表格，切换时只需指定table_name参数
    # hot_books:
    #   app_token: "xxx"
    #   table_id: "xxx"
    # authors:
    #   app_token: "xxx"
    #   table_id: "xxx"

# 服务配置
server:
  host: "0.0.0.0"
  port: 8000
  base_url: "http://localhost:8000"  # 动态配置服务地址，根据实际部署修改

# LLM配置
llm:
  # 支持的类型: rule(默认规则匹配), openai(兼容OpenAI协议), ollama(本地部署模型)
  type: "ollama"
  # 通用配置
  api_base: "http://localhost:11434/v1" # 服务地址，如ollama填http://localhost:11434/v1，openai填https://api.openai.com/v1
  api_key: "ollama" # API密钥
  model_name: "qwen3:4b" # 模型名称，如ollama的qwen:7b，openai的gpt-3.5-turbo
